name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: unit tests (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test

  build:
    name: tauri build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --no-frozen-lockfile

      # Build only — Release creation is handled by the separate `publish` job
      # below to avoid 3 matrix jobs racing on the same Release simultaneously.
      - name: tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: lumi-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore

  # Runs only on `v*` tag pushes — aggregates artifacts from all 3 builds
  # and creates a single GitHub Release. Avoids the race condition tauri-action
  # has when multiple matrix jobs try to create the same Release.
  publish:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list collected artifacts
        run: find dist -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Lumi ${{ github.ref_name }}"
          prerelease: true
          draft: false
          fail_on_unmatched_files: false
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
          body: |
            ## Lumi — Anime AI Study Buddy
            First public alpha. Strictly SFW productivity coach with a 3D anime character on your desktop.

            ### Downloads
            - **Windows**: `Lumi_0.0.1_x64-setup.exe` (NSIS installer) or `Lumi_0.0.1_x64_en-US.msi`
            - **macOS**: `Lumi_0.0.1_universal.dmg` (Apple Silicon + Intel)
            - **Linux**: `lumi_0.0.1_amd64.AppImage` (portable) or `lumi_0.0.1_amd64.deb` (Debian/Ubuntu)

            ### First-run warnings (no code-signing on alpha)
            - **Windows**: SmartScreen will say "unrecognized publisher" → click **More info** → **Run anyway**
            - **macOS**: Right-click the .dmg → **Open**, then drag Lumi to Applications. First launch: System Settings → Privacy & Security → **Open anyway**
            - **Linux**: `chmod +x lumi_*.AppImage && ./lumi_*.AppImage`

            ### Quick start
            1. Open Lumi → ⚙ Settings → paste an OpenRouter or Mistral API key
            2. Hit 🍅 to start a Pomodoro
            3. Click on the character → she reacts

            ### Known limitations (alpha)
            - No code-signing certificates yet (Steam release Q3 will fix this)
            - License key delivery requires NOWPayments webhook configured
            - macOS / Linux builds untested in production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
