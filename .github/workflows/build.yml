name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: pnpm intentionally omitted — fails with packageManager field
          # + pnpm/action-setup@v4 combination. pnpm/action-setup handles its
          # own store cache anyway.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test

  build:
    name: tauri build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: pnpm intentionally omitted — fails with packageManager field
          # + pnpm/action-setup@v4 combination. pnpm/action-setup handles its
          # own store cache anyway.

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --no-frozen-lockfile

      - name: tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Lumi {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: lumi-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore
