name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: unit tests (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test

  build:
    name: tauri build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # macos-latest runner is arm64 (M1) since 2024 — build native, skip
          # universal target which often flakes on first-time projects.
          - platform: macos-latest
            args: ""
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --no-frozen-lockfile

      # Build only — Release creation is handled by the separate `publish` job
      # below to avoid 3 matrix jobs racing on the same Release simultaneously.
      - name: tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: lumi-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore

  # Runs only on `v*` tag pushes — aggregates artifacts from all 3 builds
  # and creates a single GitHub Release. Avoids the race condition tauri-action
  # has when multiple matrix jobs try to create the same Release.
  publish:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list collected artifacts
        run: find dist -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Lumi ${{ github.ref_name }}"
          prerelease: true
          draft: false
          fail_on_unmatched_files: false
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.AppImage
            dist/**/*.deb
          body: |
            ## Lumi — Anime AI Study Buddy
            Strictly SFW productivity coach with a 3D anime character on your desktop. She runs your Pomodoros, nudges you off YouTube, and actually talks back.

            ### ✨ New in this release
            - **🧠 Long-term memory** — Lumi remembers you across sessions: your projects, deadlines, wins and recurring struggles, woven in naturally. **100% on your device**, uses your own AI key, with a clear first-run heads-up and full see / edit / delete / disable control in Settings. Privacy is the point — nothing is uploaded.
            - **60-second onboarding** — she works the moment you open her (Pomodoro, voice, click reactions, no setup); a guided step gets you a **FREE** AI key.
            - **FREE models by default** + **4 AI providers** (OpenRouter, OpenAI, Anthropic, Mistral).
            - **"Test key" button**, **friendly errors + Retry**, full-body character with calmer animations, real Pro license verification + recover-by-email.

            ### Downloads
            - **Windows**: `Lumi_0.0.3_x64-setup.exe` (NSIS installer) or `Lumi_0.0.3_x64_en-US.msi`
            - **macOS**: `Lumi_0.0.3_aarch64.dmg` (Apple Silicon — M1/M2/M3)
            - **Linux**: `Lumi_0.0.3_amd64.AppImage` (portable) or `Lumi_0.0.3_amd64.deb` (Debian/Ubuntu)

            ### First-run warnings (no code-signing on alpha)
            - **Windows**: SmartScreen will say "unrecognized publisher" → click **More info** → **Run anyway**
            - **macOS**: Right-click the .dmg → **Open**, then drag Lumi to Applications. First launch: System Settings → Privacy & Security → **Open anyway**
            - **Linux**: `chmod +x Lumi_*.AppImage && ./Lumi_*.AppImage`

            ### Quick start
            1. Open Lumi — the welcome guide helps you grab a **free** AI key in ~60s
            2. Hit 🍅 to start a Pomodoro
            3. Click on the character → she reacts

            ### Privacy
            100% local. No telemetry. Your API key never leaves your machine. Active-window detection sees the window title only, never pixels.

            ### Known limitations (alpha)
            - No code-signing certificates yet (Steam release Q3 will fix this)
            - macOS Intel + Linux ARM not yet built
            - Cloud sync / memory / character DLC coming post-launch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
